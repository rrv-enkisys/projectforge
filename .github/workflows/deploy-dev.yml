name: Deploy to Dev

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: projectforge
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── BUILD & PUSH ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: apps/api-gateway
          - name: core-service
            context: apps/core-service
          - name: ai-service
            context: apps/ai-service
          - name: notification-service
            context: apps/notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}

  # ─── DEPLOY DEV ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev (${{ matrix.service.cloud_run_name }})
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    environment:
      name: dev
      url: https://dev.projectforge.app
    strategy:
      max-parallel: 1   # sequential to avoid Cloud Run race conditions
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            cloud_run_name: api-gateway-dev
          - name: core-service
            cloud_run_name: core-service-dev
          - name: ai-service
            cloud_run_name: ai-service-dev
          - name: notification-service
            cloud_run_name: notification-service-dev
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service.name }}
        run: |
          gcloud run deploy ${{ matrix.service.cloud_run_name }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --quiet

      - name: Verify health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service.cloud_run_name }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Checking: $SERVICE_URL/health"
          for i in {1..5}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # ─── NOTIFY ────────────────────────────────────────────────────────────────
  notify:
    name: Notify Dev Deploy
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        if: ${{ env.SLACK_BOT_TOKEN != '' }}
        with:
          payload: |
            {
              "text": "${{ needs.deploy-dev.result == 'success' && ':white_check_mark:' || ':x:' }} Dev deploy ${{ needs.deploy-dev.result }}: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>",
              "attachments": [{
                "color": "${{ needs.deploy-dev.result == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Author", "value": "${{ github.actor }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
