name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── FRONTEND ──────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.0.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @projectforge/web lint

      - name: Type check
        run: pnpm --filter @projectforge/web exec tsc --noEmit

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.0.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @projectforge/web build
        env:
          VITE_API_URL: http://localhost:8080

  # ─── PYTHON SERVICES ───────────────────────────────────────────────────────
  lint-core-service:
    name: Lint Core Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==1.7.1

      - name: Cache Poetry deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-core-${{ hashFiles('apps/core-service/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: ruff check
        run: poetry run ruff check .

      - name: black --check
        run: poetry run black --check .

      - name: isort --check
        run: poetry run isort --check-only .

      - name: mypy
        run: poetry run mypy src/
        env:
          FIREBASE_PROJECT_ID: test-project

  lint-ai-service:
    name: Lint AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==1.7.1

      - name: Cache Poetry deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-ai-${{ hashFiles('apps/ai-service/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: ruff check
        run: poetry run ruff check .

      - name: black --check
        run: poetry run black --check .

      - name: isort --check
        run: poetry run isort --check-only .

      - name: mypy
        run: poetry run mypy src/

  test-core-service:
    name: Test Core Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core-service
    services:
      postgres:
        image: ankane/pgvector:v0.7.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: projectforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==1.7.1

      - name: Cache Poetry deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-core-${{ hashFiles('apps/core-service/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Create test schema
        run: |
          poetry run python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from src.database import Base
          async def create_tables():
              engine = create_async_engine('postgresql+asyncpg://postgres:postgres@localhost:5432/projectforge_test')
              async with engine.begin() as conn:
                  await conn.execute(
                      __import__('sqlalchemy').text('CREATE EXTENSION IF NOT EXISTS vector')
                  )
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()
          asyncio.run(create_tables())
          "
        env:
          FIREBASE_PROJECT_ID: test-project

      - name: Run tests
        run: poetry run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          FIREBASE_PROJECT_ID: test-project
          DEBUG: "true"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: core-service-coverage
          path: apps/core-service/coverage.xml

  test-ai-service:
    name: Test AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==1.7.1

      - name: Cache Poetry deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-ai-${{ hashFiles('apps/ai-service/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        # Integration tests may require DB — only unit/ runs in CI
        run: poetry run pytest tests/unit/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-service-coverage
          path: apps/ai-service/coverage.xml

  # ─── GO SERVICES ───────────────────────────────────────────────────────────
  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/api-gateway/go.sum

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gateway-coverage
          path: apps/api-gateway/coverage.out

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/notification-service/go.sum

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -v -race ./...

  # ─── DOCKER BUILD CHECK ────────────────────────────────────────────────────
  build-images:
    name: Docker Build Check (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs:
      - lint-frontend
      - lint-core-service
      - lint-ai-service
      - test-api-gateway
      - test-notification-service
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: apps/api-gateway
          - name: core-service
            context: apps/core-service
          - name: ai-service
            context: apps/ai-service
          - name: notification-service
            context: apps/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: projectforge/${{ matrix.service.name }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
