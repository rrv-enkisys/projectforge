name: Deploy to Production

on:
  release:
    types: [published]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: projectforge
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  # ─── BUILD & PUSH RELEASE IMAGES ───────────────────────────────────────────
  build-and-push-release:
    name: Build & Push Release (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: apps/api-gateway
          - name: core-service
            context: apps/core-service
          - name: ai-service
            context: apps/ai-service
          - name: notification-service
            context: apps/notification-service
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:stable
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          labels: |
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}

  # ─── DEPLOY STAGING ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (${{ matrix.service.cloud_run_name }})
    runs-on: ubuntu-latest
    needs: build-and-push-release
    permissions:
      contents: read
      id-token: write
    environment:
      name: staging
      url: https://staging.projectforge.app
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            cloud_run_name: api-gateway-staging
          - name: core-service
            cloud_run_name: core-service-staging
          - name: ai-service
            cloud_run_name: ai-service-staging
          - name: notification-service
            cloud_run_name: notification-service-staging
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service.name }} to Staging
        run: |
          gcloud run deploy ${{ matrix.service.cloud_run_name }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --quiet

  # ─── SMOKE TESTS (STAGING) ─────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get staging URLs
        id: urls
        run: |
          GATEWAY_URL=$(gcloud run services describe api-gateway-staging \
            --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "gateway_url=$GATEWAY_URL" >> $GITHUB_OUTPUT

          CORE_URL=$(gcloud run services describe core-service-staging \
            --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "core_url=$CORE_URL" >> $GITHUB_OUTPUT

          AI_URL=$(gcloud run services describe ai-service-staging \
            --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "ai_url=$AI_URL" >> $GITHUB_OUTPUT

      - name: Health checks
        run: |
          check() {
            local url=$1
            local endpoint=$2
            local expected=$3
            local status=$(curl -sf -o /dev/null -w "%{http_code}" "${url}${endpoint}" || echo "000")
            if [ "$status" = "$expected" ]; then
              echo "  PASS ${endpoint} -> ${status}"
            else
              echo "  FAIL ${endpoint} -> ${status} (expected ${expected})"
              exit 1
            fi
          }

          BASE="${{ steps.urls.outputs.gateway_url }}"
          echo "=== API Gateway ==="
          check "$BASE" "/health" "200"
          # Authenticated routes must return 401 without a token
          check "$BASE" "/api/v1/projects" "401"
          check "$BASE" "/api/v1/tasks" "401"

          echo "=== Core Service ==="
          check "${{ steps.urls.outputs.core_url }}" "/health" "200"

          echo "=== AI Service ==="
          check "${{ steps.urls.outputs.ai_url }}" "/health" "200"

          echo "All smoke tests passed"

  # ─── MANUAL APPROVAL + PROD DEPLOY ─────────────────────────────────────────
  # The "production" GitHub Environment must have Required Reviewers configured.
  # Go to: Settings → Environments → production → Required reviewers
  deploy-prod:
    name: Deploy to Production (${{ matrix.service.cloud_run_name }})
    runs-on: ubuntu-latest
    needs: smoke-tests
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://app.projectforge.app
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            cloud_run_name: api-gateway-prod
          - name: core-service
            cloud_run_name: core-service-prod
          - name: ai-service
            cloud_run_name: ai-service-prod
          - name: notification-service
            cloud_run_name: notification-service-prod
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service.name }} to Production (blue-green)
        run: |
          # Deploy new revision without routing traffic yet
          gcloud run deploy ${{ matrix.service.cloud_run_name }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --no-traffic \
            --tag ${{ env.IMAGE_TAG }} \
            --quiet

          # Health-check the new revision before shifting traffic
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service.cloud_run_name }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')

          STATUS="000"
          for i in {1..5}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed — routing 100% traffic to new revision"
              gcloud run services update-traffic ${{ matrix.service.cloud_run_name }} \
                --to-latest \
                --region ${{ env.REGION }} \
                --project ${{ env.PROJECT_ID }} \
                --quiet
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done

          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — keeping previous revision in traffic"
            exit 1
          fi

  # ─── NOTIFY ────────────────────────────────────────────────────────────────
  notify:
    name: Notify Production Deploy
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        if: ${{ env.SLACK_BOT_TOKEN != '' }}
        with:
          payload: |
            {
              "text": "${{ needs.deploy-prod.result == 'success' && ':rocket:' || ':fire:' }} Production deploy ${{ needs.deploy-prod.result }}: ${{ github.event.release.tag_name }}",
              "attachments": [{
                "color": "${{ needs.deploy-prod.result == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Version", "value": "${{ github.event.release.tag_name }}", "short": true},
                  {"title": "Release", "value": "${{ github.event.release.html_url }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
